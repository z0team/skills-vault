<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 14" shape-rendering="crispEdges">
  <!-- Idle-state pixel-art octopus from EmptyOctopus.tsx -->
  <!-- Body (accent orange) -->
  <g fill="#faa32c">
    <rect x="4" y="1" width="8" height="1"/>
    <rect x="3" y="2" width="10" height="1"/>
    <rect x="2" y="3" width="12" height="1"/>
    <rect x="2" y="4" width="2" height="1"/><rect x="6" y="4" width="4" height="1"/><rect x="12" y="4" width="2" height="1"/>
    <rect x="2" y="5" width="2" height="1"/><rect x="6" y="5" width="4" height="1"/><rect x="12" y="5" width="2" height="1"/>
    <rect x="2" y="6" width="12" height="4"/>
    <rect x="2" y="10" width="2" height="3"/><rect x="7" y="10" width="2" height="3"/><rect x="12" y="10" width="2" height="3"/>
  </g>
  <!-- Outline + eyes (black) -->
  <g fill="#000">
    <rect x="4" y="0" width="8" height="1"/>
    <rect x="3" y="1" width="1" height="1"/><rect x="12" y="1" width="1" height="1"/>
    <rect x="2" y="2" width="1" height="1"/><rect x="13" y="2" width="1" height="1"/>
    <rect x="1" y="3" width="1" height="7"/><rect x="14" y="3" width="1" height="7"/>
    <!-- Eyes -->
    <rect x="4" y="4" width="2" height="2"/><rect x="10" y="4" width="2" height="2"/>
    <!-- Tentacle outlines -->
    <rect x="1" y="10" width="1" height="3"/><rect x="4" y="10" width="1" height="3"/><rect x="6" y="10" width="1" height="3"/><rect x="9" y="10" width="1" height="3"/><rect x="11" y="10" width="1" height="3"/><rect x="14" y="10" width="1" height="3"/>
    <!-- Bottom caps -->
    <rect x="2" y="13" width="2" height="1"/><rect x="7" y="13" width="2" height="1"/><rect x="12" y="13" width="2" height="1"/>
  </g>
</svg>
